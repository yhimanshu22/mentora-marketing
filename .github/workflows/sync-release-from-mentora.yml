# Syncs Windows installers from the private mentora app repo to public releases here.
#
# Triggers:
#   - repository_dispatch from mentora (automatic on release publish)
#   - workflow_dispatch (manual: provide tag e.g. v1.0.0)
#
# Required secret on mentora-marketing:
#   MENTORA_REPO_TOKEN — classic PAT with "repo" scope, OR fine-grained PAT with
#   Contents: Read on private repo yhimanshu22/mentora

name: Sync release from mentora

env:
  MENTORA_SOURCE_REPO: yhimanshu22/mentora

on:
  repository_dispatch:
    types: [mentora-release-published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to sync (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: meta
        run: |
          TAG="${{ github.event.client_payload.tag || inputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "No release tag provided."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Syncing release $TAG from ${{ env.MENTORA_SOURCE_REPO }}"

      - name: Verify access to private mentora repo
        env:
          GH_TOKEN: ${{ secrets.MENTORA_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::MENTORA_REPO_TOKEN is not set on mentora-marketing."
            echo "Add a PAT with read access to private ${{ env.MENTORA_SOURCE_REPO }}."
            exit 1
          fi
          gh repo view "${{ env.MENTORA_SOURCE_REPO }}" --json name,visibility

      - name: Download assets from private mentora repo
        env:
          GH_TOKEN: ${{ secrets.MENTORA_REPO_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          mkdir -p release-assets
          gh release download "$TAG" \
            --repo "${{ env.MENTORA_SOURCE_REPO }}" \
            --dir release-assets \
            --pattern '*'
          ls -la release-assets

      - name: Publish assets to mentora-marketing release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          REPO="${{ github.repository }}"
          gh release delete "$TAG" --repo "$REPO" --yes 2>/dev/null || true
          gh release create "$TAG" release-assets/* \
            --repo "$REPO" \
            --target "${{ github.event.repository.default_branch || 'master' }}" \
            --title "Mentora $TAG" \
            --notes "Public Windows installers mirrored from private app release $TAG."

      - name: Summary
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          echo "### Release synced" >> "$GITHUB_STEP_SUMMARY"
          echo "Public download: https://github.com/yhimanshu22/mentora-marketing/releases/tag/$TAG" >> "$GITHUB_STEP_SUMMARY"
