# Syncs Windows installers from the private mentora app repo to public releases here.
#
# Triggers:
#   - repository_dispatch from mentora (automatic on release publish)
#   - workflow_dispatch (manual: provide tag e.g. v1.0.0)
#
# Required secret on mentora-marketing:
#   MENTORA_REPO_TOKEN — PAT with "Contents: Read" on private yhimanshu22/mentora

name: Sync release from mentora

on:
  repository_dispatch:
    types: [mentora-release-published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to sync (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: meta
        run: |
          TAG="${{ github.event.client_payload.tag || inputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "No release tag provided."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Syncing release $TAG from yhimanshu22/mentora"

      - name: Download assets from private mentora repo
        env:
          GH_TOKEN: ${{ secrets.MENTORA_REPO_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          mkdir -p release-assets
          gh release download "$TAG" \
            --repo yhimanshu22/mentora \
            --dir release-assets \
            --pattern '*'
          ls -la release-assets

      - name: Publish assets to mentora-marketing release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" release-assets/* \
            --title "Mentora $TAG" \
            --notes "Public Windows installers mirrored from private app release $TAG."

      - name: Summary
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          echo "### Release synced" >> "$GITHUB_STEP_SUMMARY"
          echo "Public download: https://github.com/yhimanshu22/mentora-marketing/releases/tag/$TAG" >> "$GITHUB_STEP_SUMMARY"
