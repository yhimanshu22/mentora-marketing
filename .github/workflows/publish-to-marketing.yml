# Copy this file to the private mentora app repo as:
#   .github/workflows/publish-to-marketing.yml
#
# Required secret on mentora repo:
#   MARKETING_REPO_DISPATCH_TOKEN — PAT with "Contents: Read and write" on mentora-marketing

name: Notify marketing site release

on:
  release:
    types: [published]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger public release sync
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.MARKETING_REPO_DISPATCH_TOKEN }}
          repository: yhimanshu22/mentora-marketing
          event-type: mentora-release-published
          client-payload: >-
            {
              "tag": "${{ github.event.release.tag_name }}",
              "name": "${{ github.event.release.name }}"
            }
