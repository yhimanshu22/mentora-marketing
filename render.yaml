services:
  - type: web
    name: mentora-api
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SITE_URL
        value: https://mentora-marketing-eta.vercel.app
      - key: CORS_ORIGINS
        value: https://mentora-marketing-eta.vercel.app,http://localhost:5173,http://localhost:5174,tauri://localhost,https://tauri.localhost
